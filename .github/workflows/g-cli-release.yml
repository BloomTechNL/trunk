name: g_cli release

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: bash scripts/run_tests.sh

  build-and-release:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/g_cli

      - name: Build binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Stage binary
        run: mv target/aarch64-apple-darwin/release/g g

      - name: Update latest tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -f latest
          git push -f origin latest

      - name: Publish rolling release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest --title "Latest Build" --notes "Automated rolling release." || true
          gh release upload latest g --clobber
